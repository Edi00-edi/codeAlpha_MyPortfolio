<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha | Music Player</title>
    <link rel="stylesheet" href="music.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="player-container">
        <div class="music-card">
            <div class="album-art">
                <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400" id="track-art" alt="Album Art">
            </div>
            
            <div class="track-info">
                <h2 id="track-name">Song Title</h2>
                <p id="track-artist">Artist Name</p>
            </div>

            <div class="progress-container">
                <input type="range" min="0" max="100" value="0" class="progress-bar" id="progress-bar">
                <div class="duration-info">
                    <span id="current-time">0:00</span>
                    <span id="total-duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="ctrl-btn" onclick="prevTrack()"><i class="fas fa-step-backward"></i></button>
                <button class="play-pause" id="play-pause" onclick="togglePlay()"><i class="fas fa-play"></i></button>
                <button class="ctrl-btn" onclick="nextTrack()"><i class="fas fa-step-forward"></i></button>
            </div>

            <div class="volume-container">
                <i class="fas fa-volume-up"></i>
                <input type="range" min="0" max="100" value="80" class="volume-slider" id="volume-slider">
            </div>
        </div>
    </div>

    <audio id="main-audio" src=""></audio>

    <script src="music.js"></script>
</body>
</html>
